name: CI

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/demo-app

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Registry cache: 只上傳有變動的 layer，減少流量
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Update GitOps Repo
        env:
          PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git clone https://x-token:${PAT}@github.com/${{ github.repository_owner }}/demo-gitops
          cd demo-gitops
          sed -i "s|image: ghcr.io/.*/demo-app:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" deployment.yaml
          git config user.email "ci-bot@github.com"
          git config user.name "GitHub Actions"
          git diff --quiet && echo "No changes, skipping push" && exit 0
          git commit -am "ci: update image to ${{ github.sha }}"
          git push
