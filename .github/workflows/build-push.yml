name: Build and Push to GHCR (test)

on:
  push:
    branches:
      - test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="test-${SHORT_SHA}"
          IMAGE="ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/demo-app"
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ${IMAGE}:${TAG} -t ${IMAGE}:test-latest .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:test-latest

      - name: Update demo-gitops test branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="test-${SHORT_SHA}"
          IMAGE="ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/demo-app"
          git clone --branch test https://VashHuang-ASUS:${GITHUB_TOKEN}@github.com/VashHuang-ASUS/demo-gitops.git
          cd demo-gitops
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${TAG}|" apps/demo-app/deployment.yaml
          sed -i "s|value: \"[^\"]*\"|value: \"${TAG}\"|" apps/demo-app/deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add apps/demo-app/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "update demo-app image to ${TAG} (test)"
          git push origin test
