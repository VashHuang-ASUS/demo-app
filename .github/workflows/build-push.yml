name: Build and Push to GHCR

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ghcr.io/vashhuang-asus/demo-app:${{ github.ref_name }} \
                       -t ghcr.io/vashhuang-asus/demo-app:latest .
          docker push ghcr.io/vashhuang-asus/demo-app:${{ github.ref_name }}
          docker push ghcr.io/vashhuang-asus/demo-app:latest

      - name: Update demo-gitops image tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          git clone https://VashHuang-ASUS:${GITHUB_TOKEN}@github.com/VashHuang-ASUS/demo-gitops.git
          cd demo-gitops
          sed -i "s|image: ghcr.io/vashhuang-asus/demo-app:.*|image: ghcr.io/vashhuang-asus/demo-app:${VERSION}|" apps/demo-app/deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add apps/demo-app/deployment.yaml
          git commit -m "update demo-app image to ${VERSION}"
          git push
