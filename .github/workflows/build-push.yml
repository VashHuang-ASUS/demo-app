name: Build and Push to GHCR

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push
        run: |
          IMAGE="ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/demo-app"
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ${IMAGE}:${{ github.ref_name }} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${{ github.ref_name }}
          docker push ${IMAGE}:latest

      - name: Update demo-gitops image tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          IMAGE="ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/demo-app"
          git clone https://VashHuang-ASUS:${GITHUB_TOKEN}@github.com/VashHuang-ASUS/demo-gitops.git
          cd demo-gitops
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${VERSION}|" apps/demo-app/deployment.yaml
          sed -i "s|value: \"[^\"]*\"|value: \"${VERSION}\"|" apps/demo-app/deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add apps/demo-app/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "update demo-app image to ${VERSION}"
          git push
