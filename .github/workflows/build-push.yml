name: Build and Push to GHCR

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update demo-gitops image tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git clone https://VashHuang-ASUS:${GITHUB_TOKEN}@github.com/VashHuang-ASUS/demo-gitops.git
          cd demo-gitops
          sed -i "s|image: ghcr.io/vashhuang-asus/demo-app:.*|image: ghcr.io/vashhuang-asus/demo-app:${VERSION}|" apps/demo-app/deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add apps/demo-app/deployment.yaml
          git commit -m "update demo-app image to ${VERSION}"
          git push
